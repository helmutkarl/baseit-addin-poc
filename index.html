<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Spam E-Mail an das BRZ melden</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</head>
<body>
  <h3>Spam E-Mail an das BRZ melden</h3>
  <p>BaseIT POC – benutzerseitig geladenes Add-in.</p>
  <button id="btn">Nachricht analysieren</button>
  <div id="ok" style="display:none; margin-top:12px;">POC erfolgreich geladen.</div>

  <script>
    Office.onReady(() => {
      document.getElementById('btn').addEventListener('click', () => {
        document.getElementById('ok').style.display = 'block';
      });
    });
  </script>
</body>
</html>
